<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 2 — The Craft | Drum Tarmacadam</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
.ad-wrap { position: relative; width: 1080px; height: 1080px; overflow: hidden; background: #111; flex-shrink: 0; }
.bg-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.72) 100%); z-index: 2; }
.scene { position: absolute; inset: 0; z-index: 3; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.7s ease; padding: 60px; }
.scene.active { opacity: 1; pointer-events: all; }

/* Scene 1 */
.s1-label { font-size: 22px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: #f59e0b; margin-bottom: 20px; opacity: 0; transform: translateY(-16px); transition: all 0.5s ease 0.1s; }
.scene-1.active .s1-label { opacity: 1; transform: translateY(0); }
.s1-heading { font-size: 72px; font-weight: 900; color: #fff; text-align: center; line-height: 1.05; text-shadow: 0 6px 30px rgba(0,0,0,0.8); opacity: 0; transform: scale(0.9); transition: all 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s; }
.scene-1.active .s1-heading { opacity: 1; transform: scale(1); }
.s1-heading span { color: #2563eb; display: block; }

/* Scene 2 */
.craft-pills { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-bottom: 36px; }
.craft-pill { background: rgba(37,99,235,0.85); border: 2px solid #2563eb; border-radius: 50px; padding: 12px 26px; font-size: 20px; color: #fff; font-weight: 700; opacity: 0; transform: translateY(20px); transition: all 0.5s ease; }
.scene-2.active .craft-pill:nth-child(1) { opacity: 1; transform: translateY(0); transition-delay: 0.05s; }
.scene-2.active .craft-pill:nth-child(2) { opacity: 1; transform: translateY(0); transition-delay: 0.2s; }
.scene-2.active .craft-pill:nth-child(3) { opacity: 1; transform: translateY(0); transition-delay: 0.35s; }
.s2-main { font-size: 54px; font-weight: 900; color: #fff; text-align: center; line-height: 1.15; text-shadow: 0 4px 20px rgba(0,0,0,0.7); opacity: 0; transform: translateY(24px); transition: all 0.7s cubic-bezier(0.22,1,0.36,1) 0.45s; }
.scene-2.active .s2-main { opacity: 1; transform: translateY(0); }
.s2-main em { color: #f59e0b; font-style: normal; }

/* Scene 3 */
.scene-3 { background: linear-gradient(160deg, rgba(5,5,30,0.97), rgba(20,48,90,0.97)); }
.s3-top { font-size: 26px; font-weight: 700; color: #f59e0b; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; opacity: 0; transition: opacity 0.4s ease; }
.scene-3.active .s3-top { opacity: 1; }
.s3-phone { font-size: 90px; font-weight: 900; color: #fff; letter-spacing: -2px; line-height: 1; opacity: 0; transform: translateY(20px); transition: all 0.6s cubic-bezier(0.22,1,0.36,1) 0.2s; }
.scene-3.active .s3-phone { opacity: 1; transform: translateY(0); }
.s3-phone span { color: #2563eb; }
.s3-web { font-size: 28px; color: rgba(255,255,255,0.65); margin-top: 16px; font-weight: 500; opacity: 0; transition: opacity 0.5s ease 0.45s; }
.scene-3.active .s3-web { opacity: 1; }
.s3-brand { margin-top: 28px; font-size: 34px; font-weight: 900; color: #fff; letter-spacing: 3px; opacity: 0; transition: opacity 0.5s ease 0.6s; }
.scene-3.active .s3-brand { opacity: 1; }

.progress-bar { position: absolute; bottom: 0; left: 0; height: 6px; background: #f59e0b; z-index: 20; width: 0%; }
.watermark { position: absolute; bottom: 28px; right: 32px; z-index: 10; font-size: 16px; font-weight: 900; color: rgba(255,255,255,0.45); letter-spacing: 1px; }
.controls { margin-top: 24px; display: flex; gap: 14px; align-items: center; }
.btn { padding: 14px 32px; border-radius: 50px; border: none; cursor: pointer; font-size: 16px; font-weight: 700; transition: all 0.2s; }
.btn-play { background: #2563eb; color: #fff; }
.btn-play:hover { background: #1d4ed8; transform: scale(1.04); }
.btn-download { background: #f59e0b; color: #000; }
.btn-download:hover { background: #d97706; transform: scale(1.04); }
.btn-download:disabled { background: #94a3b8; color: #fff; cursor: not-allowed; transform: none; }
.rec-dot { width: 12px; height: 12px; background: #ef4444; border-radius: 50%; display: none; }
.rec-dot.active { display: block; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
.status-text { color: #94a3b8; font-size: 14px; }
</style>
</head>
<body>
<div class="ad-wrap" id="adWrap">
  <video class="bg-video" id="bgVid" autoplay muted loop playsinline
    src="https://videos.pexels.com/video-files/3209828/3209828-uhd_2560_1440_25fps.mp4">
  </video>
  <div class="overlay"></div>

  <!-- Scene 1: 0–4s -->
  <div class="scene scene-1 active" id="scene1">
    <div class="s1-label">Watch closely</div>
    <div class="s1-heading">This is what<br><span>done right</span><br>looks like.</div>
  </div>

  <!-- Scene 2: 4–15s -->
  <div class="scene scene-2" id="scene2">
    <div class="craft-pills">
      <div class="craft-pill">Premium Materials</div>
      <div class="craft-pill">Experienced Team</div>
      <div class="craft-pill">Immaculate Finish</div>
    </div>
    <div class="s2-main">At Drum Tarmacadam,<br>we take <em>pride</em> in every<br>single job.</div>
  </div>

  <!-- Scene 3: 15–20s -->
  <div class="scene scene-3" id="scene3">
    <div class="s3-top">Get Your Free Quote Today</div>
    <div class="s3-phone"><span>087</span> 945 4566</div>
    <div class="s3-web">drumtarmacadam.ie</div>
    <div class="s3-brand">DRUM TARMACADAM</div>
  </div>

  <div class="watermark">DRUM TARMACADAM</div>
  <div class="progress-bar" id="progressBar"></div>
  <audio id="voiceover" preload="auto"><source src="audio/ad2-vo.mp3" type="audio/mpeg"></audio>
</div>

<div class="controls">
  <button class="btn btn-play" id="playBtn" onclick="startAd()">▶ Play Ad</button>
  <div class="rec-dot" id="recDot"></div>
  <button class="btn btn-download" id="dlBtn" onclick="recordAndDownload()">⬇ Record & Download</button>
  <span class="status-text" id="statusText">Ready</span>
</div>

<script>
const TOTAL = 20000;
const SCENES = [
  { el: document.getElementById('scene1'), start: 0, end: 4000 },
  { el: document.getElementById('scene2'), start: 4000, end: 15000 },
  { el: document.getElementById('scene3'), start: 15000, end: 20000 },
];
const progressBar = document.getElementById('progressBar');
const vo = document.getElementById('voiceover');
let startTime, adRunning = false;
function startAd() {
  if (adRunning) return; adRunning = true;
  document.getElementById('playBtn').disabled = true;
  SCENES.forEach(s => s.el.classList.remove('active'));
  progressBar.style.width = '0%';
  vo.currentTime = 0; vo.play().catch(() => {});
  startTime = performance.now();
  requestAnimationFrame(tick);
}
function tick(now) {
  const elapsed = now - startTime;
  progressBar.style.width = Math.min((elapsed / TOTAL) * 100, 100) + '%';
  SCENES.forEach(s => s.el.classList.toggle('active', elapsed >= s.start && elapsed < s.end));
  if (elapsed < TOTAL) { requestAnimationFrame(tick); }
  else { SCENES[SCENES.length-1].el.classList.add('active'); adRunning = false; document.getElementById('playBtn').disabled = false; }
}
async function recordAndDownload() {
  const btn = document.getElementById('dlBtn'); const dot = document.getElementById('recDot'); const status = document.getElementById('statusText');
  if (adRunning) return; btn.disabled = true; dot.classList.add('active'); status.textContent = 'Recording… (20s)';
  const stream = document.getElementById('adWrap').captureStream(60);
  try { const ctx = new AudioContext(); const dest = ctx.createMediaStreamDestination(); const src = ctx.createMediaElementSource(vo); src.connect(dest); src.connect(ctx.destination); dest.stream.getAudioTracks().forEach(t => stream.addTrack(t)); } catch(e){}
  const chunks = []; const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
  const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 8000000 });
  rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  rec.onstop = () => { const blob = new Blob(chunks, { type: mime }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'drum-tarmacadam-ad2-the-craft.webm'; a.click(); URL.revokeObjectURL(url); btn.disabled = false; dot.classList.remove('active'); status.textContent = 'Downloaded!'; };
  rec.start(); startAd(); setTimeout(() => rec.stop(), TOTAL + 500);
}
</script>
</body>
</html>
