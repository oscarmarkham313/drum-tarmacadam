<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad 3 — The Urgency | Drum Tarmacadam</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
.ad-wrap { position: relative; width: 1080px; height: 1080px; overflow: hidden; background: #111; flex-shrink: 0; }
.bg-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.78) 100%); z-index: 2; }
.scene { position: absolute; inset: 0; z-index: 3; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.6s ease; padding: 70px; }
.scene.active { opacity: 1; pointer-events: all; }

/* Scene 1: relatable hook */
.s1-question { font-size: 58px; font-weight: 900; color: #fff; text-align: center; line-height: 1.15; text-shadow: 0 4px 28px rgba(0,0,0,0.85); opacity: 0; transform: translateY(30px); transition: all 0.7s cubic-bezier(0.22,1,0.36,1) 0.1s; }
.scene-1.active .s1-question { opacity: 1; transform: translateY(0); }
.s1-question span { color: #f59e0b; display: block; font-size: 72px; margin-top: 8px; }

/* Scene 2: solution */
.s2-brand-row { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; opacity: 0; transform: translateX(-20px); transition: all 0.5s ease 0.1s; }
.scene-2.active .s2-brand-row { opacity: 1; transform: translateX(0); }
.s2-dot { width: 18px; height: 18px; background: #2563eb; border-radius: 50%; }
.s2-brand-name { font-size: 28px; font-weight: 900; color: #fff; letter-spacing: 2px; text-transform: uppercase; }
.s2-msg { font-size: 52px; font-weight: 900; color: #fff; text-align: center; line-height: 1.15; text-shadow: 0 4px 20px rgba(0,0,0,0.7); opacity: 0; transform: scale(0.93); transition: all 0.7s cubic-bezier(0.22,1,0.36,1) 0.25s; }
.scene-2.active .s2-msg { opacity: 1; transform: scale(1); }
.s2-msg em { color: #2563eb; font-style: normal; }
.s2-urgency { margin-top: 30px; background: rgba(239,68,68,0.18); border: 2px solid rgba(239,68,68,0.6); border-radius: 12px; padding: 16px 32px; font-size: 24px; color: #fca5a5; font-weight: 700; text-align: center; opacity: 0; transform: translateY(16px); transition: all 0.5s ease 0.55s; }
.scene-2.active .s2-urgency { opacity: 1; transform: translateY(0); }

/* Scene 3: CTA */
.scene-3 { background: radial-gradient(ellipse at center, rgba(37,99,235,0.25) 0%, rgba(5,5,30,0.97) 70%); }
.s3-cta-line { font-size: 30px; font-weight: 700; color: #f59e0b; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; opacity: 0; transition: opacity 0.4s ease; }
.scene-3.active .s3-cta-line { opacity: 1; }
.s3-num { font-size: 88px; font-weight: 900; color: #fff; letter-spacing: -2px; line-height: 1; opacity: 0; transform: scale(0.85); transition: all 0.6s cubic-bezier(0.22,1,0.36,1) 0.15s; }
.scene-3.active .s3-num { opacity: 1; transform: scale(1); }
.s3-num span { color: #2563eb; }
.s3-free { margin-top: 22px; font-size: 26px; color: rgba(255,255,255,0.75); font-weight: 600; opacity: 0; transition: opacity 0.5s ease 0.4s; }
.scene-3.active .s3-free { opacity: 1; }
.s3-web { font-size: 24px; color: rgba(255,255,255,0.5); margin-top: 10px; opacity: 0; transition: opacity 0.5s ease 0.55s; }
.scene-3.active .s3-web { opacity: 1; }

.progress-bar { position: absolute; bottom: 0; left: 0; height: 6px; background: #ef4444; z-index: 20; width: 0%; }
.watermark { position: absolute; bottom: 28px; right: 32px; z-index: 10; font-size: 16px; font-weight: 900; color: rgba(255,255,255,0.4); letter-spacing: 1px; }
.controls { margin-top: 24px; display: flex; gap: 14px; align-items: center; }
.btn { padding: 14px 32px; border-radius: 50px; border: none; cursor: pointer; font-size: 16px; font-weight: 700; transition: all 0.2s; }
.btn-play { background: #2563eb; color: #fff; } .btn-play:hover { background: #1d4ed8; transform: scale(1.04); }
.btn-download { background: #f59e0b; color: #000; } .btn-download:hover { background: #d97706; transform: scale(1.04); }
.btn-download:disabled { background: #94a3b8; color: #fff; cursor: not-allowed; transform: none; }
.rec-dot { width: 12px; height: 12px; background: #ef4444; border-radius: 50%; display: none; }
.rec-dot.active { display: block; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
.status-text { color: #94a3b8; font-size: 14px; }
</style>
</head>
<body>
<div class="ad-wrap" id="adWrap">
  <video class="bg-video" autoplay muted loop playsinline
    src="https://videos.pexels.com/video-files/2169880/2169880-uhd_2560_1440_30fps.mp4">
  </video>
  <div class="overlay"></div>

  <!-- Scene 1: 0–4s -->
  <div class="scene scene-1 active" id="scene1">
    <div class="s1-question">Still putting off<br>that driveway?<span>Not anymore.</span></div>
  </div>

  <!-- Scene 2: 4–15s -->
  <div class="scene scene-2" id="scene2">
    <div class="s2-brand-row"><div class="s2-dot"></div><div class="s2-brand-name">Drum Tarmacadam</div><div class="s2-dot"></div></div>
    <div class="s2-msg">Premium driveways<br>across <em>Munster</em>.<br>Flawless. Fair. Fast.</div>
    <div class="s2-urgency">🔥 We're booking up fast — don't miss out</div>
  </div>

  <!-- Scene 3: 15–20s -->
  <div class="scene scene-3" id="scene3">
    <div class="s3-cta-line">Ring Us Now — Free Quote</div>
    <div class="s3-num"><span>087</span> 945 4566</div>
    <div class="s3-free">No obligation. No pushy sales.</div>
    <div class="s3-web">drumtarmacadam.ie</div>
  </div>

  <div class="watermark">DRUM TARMACADAM</div>
  <div class="progress-bar" id="progressBar"></div>
  <audio id="voiceover" preload="auto"><source src="audio/ad3-vo.mp3" type="audio/mpeg"></audio>
</div>

<div class="controls">
  <button class="btn btn-play" id="playBtn" onclick="startAd()">▶ Play Ad</button>
  <div class="rec-dot" id="recDot"></div>
  <button class="btn btn-download" id="dlBtn" onclick="recordAndDownload()">⬇ Record & Download</button>
  <span class="status-text" id="statusText">Ready</span>
</div>

<script>
const TOTAL=20000,SCENES=[{el:document.getElementById('scene1'),start:0,end:4000},{el:document.getElementById('scene2'),start:4000,end:15000},{el:document.getElementById('scene3'),start:15000,end:20000}];
const progressBar=document.getElementById('progressBar'),vo=document.getElementById('voiceover');
let startTime,adRunning=false;
function startAd(){if(adRunning)return;adRunning=true;document.getElementById('playBtn').disabled=true;SCENES.forEach(s=>s.el.classList.remove('active'));progressBar.style.width='0%';vo.currentTime=0;vo.play().catch(()=>{});startTime=performance.now();requestAnimationFrame(tick);}
function tick(now){const e=now-startTime;progressBar.style.width=Math.min((e/TOTAL)*100,100)+'%';SCENES.forEach(s=>s.el.classList.toggle('active',e>=s.start&&e<s.end));if(e<TOTAL){requestAnimationFrame(tick);}else{SCENES[SCENES.length-1].el.classList.add('active');adRunning=false;document.getElementById('playBtn').disabled=false;}}
async function recordAndDownload(){const btn=document.getElementById('dlBtn'),dot=document.getElementById('recDot'),status=document.getElementById('statusText');if(adRunning)return;btn.disabled=true;dot.classList.add('active');status.textContent='Recording… (20s)';const stream=document.getElementById('adWrap').captureStream(60);try{const ctx=new AudioContext(),dest=ctx.createMediaStreamDestination(),src=ctx.createMediaElementSource(vo);src.connect(dest);src.connect(ctx.destination);dest.stream.getAudioTracks().forEach(t=>stream.addTrack(t));}catch(e){}const chunks=[],mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm',rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:8000000});rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};rec.onstop=()=>{const blob=new Blob(chunks,{type:mime}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='drum-tarmacadam-ad3-urgency.webm';a.click();URL.revokeObjectURL(url);btn.disabled=false;dot.classList.remove('active');status.textContent='Downloaded!';};rec.start();startAd();setTimeout(()=>rec.stop(),TOTAL+500);}
</script>
</body>
</html>
